services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: containerapp-backend:latest
    container_name: containerapp-backend
    restart: unless-stopped
    environment:
      DB_HOST: "172.30.0.3"
      DB_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-appdb}"
      POSTGRES_USER: "${POSTGRES_USER:-appuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-apppass}"
    depends_on:
      database:
        condition: service_healthy
    networks:
      lan_net:
        ipv4_address: "172.30.0.2"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: containerapp-db:latest
    container_name: containerapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-appdb}"
      POSTGRES_USER: "${POSTGRES_USER:-appuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-apppass}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      lan_net:
        ipv4_address: "172.30.0.3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  pgdata:
    name: containerapp_pgdata

networks:
  lan_net:
    external: true
    name: lan_net
